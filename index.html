<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="scripts.js"></script>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="g">G</span>
                    <span class="o1">o</span>
                    <span class="o2">o</span>
                    <span class="g">g</span>
                    <span class="l">l</span>
                    <span class="e">e</span>
                    <span class="traductor">Traductor</span>
                </div>
            </div>
        </header>

        <div id="apiWarning" class="api-warning" style="display: none;">
            API no disponible. Algunas funciones pueden estar limitadas.
        </div>

        <section class="language-selection">
            <div class="select-wrapper">
                <label for="sourceLanguage">De:</label>
                <select id="sourceLanguage">
                    <option value="auto">Detectar idioma</option>
                    <option value="en">Inglés</option>
                    <option value="es" selected>Español</option>
                    <option value="fr">Francés</option>
                    <option value="de">Alemán</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Portugués</option>
                    <option value="zh">Chino</option>
                </select>
            </div>

            <button class="swap-languages icon-button" id="swapLanguages" title="Intercambiar idiomas">
                <span class="material-symbols-outlined">sync_alt</span>
            </button>

            <div class="select-wrapper">
                <label for="targetLanguage">A:</label>
                <select id="targetLanguage">
                    <option value="en">Inglés</option>
                    <option value="es">Español</option>
                    <option value="fr">Francés</option>
                    <option value="de">Alemán</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Portugués</option>
                    <option value="zh">Chino</option>
                </select>
            </div>
        </section>

        <main class="translation-area">
            <section class="input-section">
                <div class="textarea-container">
                    <textarea id="inputText" placeholder="Escribe o pega el texto aquí..." maxlength="5000"></textarea>
                </div>
                <footer class="input-controls">
                    <button class="icon-button mic-button" id="micButton" title="Dictar">
                        <span class="material-symbols-outlined">mic</span>
                    </button>
                    <button class="icon-button clear-button" id="clearButton" title="Borrar">
                        <span class="material-symbols-outlined">backspace</span>
                    </button>
                </footer>
            </section>

            <section class="output-section">
                <div class="textarea-container">
                    <output id="outputText"></output>
                    <footer class="output-controls">
                        <button class="icon-button copy-button" id="copyButton" title="Copiar texto">
                            <span class="material-symbols-outlined">content_copy</span>
                        </button>
                        <button class="icon-button speaker-button" id="speakerButton" title="Escuchar traducción">
                            <span class="material-symbols-outlined">volume_up</span>
                        </button>
                    </footer>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
